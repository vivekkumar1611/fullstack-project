version: "3.9"

services:

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend-blue
    networks:
      - backend-net

  backend-blue:
    build: ./backend
    container_name: backend-blue
    restart: always
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql://admin:password@db:5432/appdb
    command: ["./wait-for-db.sh", "postgresql://admin:password@db:5432/appdb", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - backend-net

  backend-green:
    build: ./backend
    container_name: backend-green
    restart: always
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql://admin:password@db:5432/appdb
    command: ["./wait-for-db.sh", "postgresql://admin:password@db:5432/appdb", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - backend-net

  proxy:
    image: nginx:alpine
    container_name: proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-blue
      - backend-green
    networks:
      - backend-net

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - db
    networks:
      - backend-net

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - backend-net

  nexus:
    image: sonatype/nexus3
    container_name: nexus
    restart: always
    ports:
      - "5000:5000"
      - "8081:8081"
    volumes:
      - nexus-data:/nexus-data
    environment:
      INSTALL4J_ADD_VM_PARAMS: "-Xms512m -Xmx1024m -XX:MaxDirectMemorySize=512m"
    networks:
      - backend-net

  sonarqube-db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_data:/var/lib/postgresql/data
    networks:
      - backend-net

  sonarqube:
    image: sonarqube:lts
    container_name: sonarqube
    restart: always
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "9000:9000"
    depends_on:
      - sonarqube-db
    networks:
      - backend-net

volumes:
  postgres_data:
  sonarqube_data:
  nexus-data:

networks:
  backend-net:
    driver: bridge
