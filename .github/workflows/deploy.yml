name: CI/CD Pipeline

on:
push:
branches:
- main

jobs:

build-and-push:
name: Build & Push to Nexus
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  # Build Images
  - name: Build backend
    run: docker build -t backend:latest ./backend

  - name: Build frontend
    run: docker build -t frontend:latest ./frontend

  # Login to Nexus
  - name: Docker Login
    run: |
      echo "${{ secrets.NEXUS_PASSWORD }}" | docker login ${{ secrets.NEXUS_IP }}:5000 \
      -u "${{ secrets.NEXUS_USERNAME }}" --password-stdin

  # Tag + Push
  - name: Push backend
    run: |
      docker tag backend:latest ${{ secrets.NEXUS_IP }}:5000/backend:latest
      docker push ${{ secrets.NEXUS_IP }}:5000/backend:latest

  - name: Push frontend
    run: |
      docker tag frontend:latest ${{ secrets.NEXUS_IP }}:5000/frontend:latest
      docker push ${{ secrets.NEXUS_IP }}:5000/frontend:latest
```

deploy:
name: Deploy to EC2 (Blue-Green)
runs-on: ubuntu-latest
needs: build-and-push

```
steps:
  - name: Setup SSH
    run: |
      echo "${{ secrets.EC2_KEY }}" > key.pem
      chmod 600 key.pem

  - name: Deploy
    run: |
      ssh -o StrictHostKeyChecking=no -i key.pem \
      ${{ secrets.EC2_USER }}@${{ secrets.EC2_IP }} << 'EOF'

      cd ~/fullstack-project

      # Pull latest images from Nexus
      sudo docker pull ${{ secrets.NEXUS_IP }}:5000/backend:latest
      sudo docker pull ${{ secrets.NEXUS_IP }}:5000/frontend:latest

      # Decide blue/green
      CURRENT=$(sudo docker ps --format '{{.Names}}' | grep backend-blue || true)

      if [[ -z "$CURRENT" ]]; then
          NEW="blue"
          OLD="green"
      else
          NEW="green"
          OLD="blue"
      fi

      echo "Deploying to $NEW"

      # Start new container
      sudo docker-compose up -d backend-$NEW

      sleep 10

      # Health check
      if curl -f http://localhost:8000/health; then
          echo "Healthy → switching"

          sed -i "s/backend-$OLD/backend-$NEW/" nginx.conf
          sudo docker exec proxy nginx -s reload

          sudo docker-compose stop backend-$OLD
      else
          echo "Failed → rollback"
          sudo docker-compose stop backend-$NEW
      fi

      EOF

  - name: Cleanup
    run: rm -f key.pem
```
